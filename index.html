<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Html <Form></Form>
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-dark">

  <div class="container bg-white py-5">
    <form>

      <div class="card-body">
        <div class="container mt-4">
          <form>
            <div class="card">
              <div class="card-header">
                <h2 class="mb-0">Payment form example</h2>
              </div>

              <div class="card-body">
                <div class="alert alert-danger">
                  Some fields are missing
                </div>

                <div class="row">
                  <div class="col-md-5 mb-3">
                    <label class="form-label fw-semibold">Card #</label>
                    <input type="text" class="form-control" placeholder="XXXXXXXXXXXXXXXX">
                  </div>

                  <div class="col-md-3 mb-3">
                    <label class="form-label fw-semibold">CVC #</label>
                    <input type="text" class="form-control" placeholder="0000">
                  </div>

                  <div class="col-md-4 mb-3">
                    <label class="form-label fw-semibold">Amount</label>

                    <div class="input-group">
                      <span class="input-group-text">€</span>
                      <input type="text" class="form-control" placeholder="Amount">
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">First Name</label>
                    <input type="text" class="form-control">
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Last Name</label>
                    <input type="text" class="form-control">
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">City</label>
                    <input type="text" class="form-control">
                  </div>

                  <div class="col-md-3 mb-3">
                    <label class="form-label fw-semibold">State</label>
                    <select class="form-select">
                      <option>Andalucía</option>
                      <option>Aragón</option>
                      <option>Principado de Asturias</option>
                      <option>Islas Baleares (Illes Balears)</option>
                      <option>Canarias</option>
                      <option>Cantabria</option>
                      <option>Castilla-La Mancha</option>
                      <option>Castilla y León</option>
                      <option>Cataluña (Catalunya)</option>
                      <option>Comunidad de Madrid</option>
                      <option>Comunidad Foral de Navarra</option>
                      <option>Comunidad Valenciana</option>
                      <option>Extremadura</option>
                      <option>Galicia</option>
                      <option>País Vasco (Euskadi)</option>
                      <option>Región de Murcia</option>
                      <option>La Rioja</option>
                    </select>
                  </div>

                  <div class="col-md-3 mb-3">
                    <label class="form-label fw-semibold">Postal Code</label>
                    <input type="text" class="form-control">
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label d-block fw-semibold">We accept:</label>

                    <div class="bg-secondary rounded p-2 d-inline-flex align-items-center gap-3">
                      <input type="radio" name="payment" class="form-check-input mt-0">
                      <i class="fa-brands fa-cc-mastercard text-white fs-6"></i>

                      <input type="radio" name="payment" class="form-check-input mt-0">
                      <i class="fa-brands fa-cc-visa text-white fs-6"></i>

                      <input type="radio" name="payment" class="form-check-input mt-0">
                      <i class="fa-brands fa-cc-diners-club text-white fs-6"></i>

                      <input type="radio" name="payment" class="form-check-input mt-0">
                      <i class="fa-brands fa-cc-amex text-white fs-6"></i>
                    </div>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Message</label>
                    <textarea class="form-control" rows="3"></textarea>
                    <div class="form-text">Add any notes here.</div>
                  </div>
                </div>
              </div>

              <div class="card-footer text-end">
                <button type="reset" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Send</button>
              </div>
            </div>
          </form>
        </div>

        <div class="card-footer">
        </div>
      </div>

    </form>
</body>

</html>
